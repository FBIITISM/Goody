{% extends "base.html" %}
{% block title %}{{ code }} Error – Goody{% endblock %}
{% block content %}
<div class="text-center py-5">
  <div class="fs-1 mb-3">
    {% if code == 404 %}🔍{% elif code == 403 %}🚫{% else %}⚠️{% endif %}
  </div>
  <h1 class="fw-bold">{{ code }}</h1>
  <p class="text-muted">{{ message }}</p>
  <a href="{{ url_for('index') }}" class="btn btn-brand mt-3">
    <i class="bi bi-house"></i> Go Home
  </a>
</div>
{% endblock %}
